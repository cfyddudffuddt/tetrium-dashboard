<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyC4qMGG9pjnQGzO_lQRAe1plFDBUj0t5lg",
      authDomain: "tetrium-aa4b0.firebaseapp.com",
      projectId: "tetrium-aa4b0",
      storageBucket: "tetrium-aa4b0.firebasestorage.app",
      messagingSenderId: "491276022047",
      appId: "1:491276022047:web:4876ff2cd2dfb666cec02a",
      measurementId: "G-JH3MYYZE3K"
    };
    
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    // Auth elements
    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const googleBtn = document.getElementById('google-signin-btn');
    
    // Email/Password Login
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = emailInput.value;
        const password = passwordInput.value;
        
        // Basic feedback
        const submitBtn = loginForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span class="material-symbols-outlined text-[20px] animate-spin">sync</span> AUTHENTICATING...';
        submitBtn.disabled = true;
        
        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                submitBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]">check_circle</span> ACCESS GRANTED';
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
            })
            .catch((error) => {
                console.error(error);
                alert("Authorization failed: " + error.message);
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
    });
    
    // Google Sign-In
    googleBtn.addEventListener('click', () => {
        const provider = new GoogleAuthProvider();
        
        const originalText = googleBtn.innerHTML;
        googleBtn.innerHTML = '<span class="material-symbols-outlined text-[20px] animate-spin">sync</span> AUTHENTICATING...';
        googleBtn.disabled = true;
        
        signInWithPopup(auth, provider)
            .then((result) => {
                googleBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]">check_circle</span> ACCESS GRANTED';
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
            })
            .catch((error) => {
                console.error(error);
                alert("Google Authorization failed: " + error.message);
                googleBtn.innerHTML = originalText;
                googleBtn.disabled = false;
            });
    });
</script>
