<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_9 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_9" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_9');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const scene = new THREE.Scene();
const containerWidth = container.clientWidth || window.innerWidth;
const containerHeight = container.clientHeight || window.innerHeight;
const camera = new THREE.PerspectiveCamera(75, containerWidth / containerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(containerWidth, containerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Group to hold the entire motor assembly
const motorGroup = new THREE.Group();
scene.add(motorGroup);

// Materials based on Tetrium Motion Control Design System
const bodyMaterial = new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 100 });
const accentMaterial = new THREE.MeshPhongMaterial({ color: 0x3b82f6, shininess: 80 }); // Primary Blue
const shaftMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
const wireMaterial = new THREE.MeshLambertMaterial({ color: 0x111111 });

// Motor Body (NEMA 17 style)
const bodyGeom = new THREE.BoxGeometry(2, 2, 2);
const body = new THREE.Mesh(bodyGeom, bodyMaterial);
motorGroup.add(body);

// Front plate
const plateGeom = new THREE.BoxGeometry(2.1, 2.1, 0.2);
const plate = new THREE.Mesh(plateGeom, bodyMaterial);
plate.position.z = 1;
motorGroup.add(plate);

// Shaft
const shaftGeom = new THREE.CylinderGeometry(0.2, 0.2, 1.5, 32);
const shaft = new THREE.Mesh(shaftGeom, shaftMaterial);
shaft.rotation.x = Math.PI / 2;
shaft.position.z = 1.5;
motorGroup.add(shaft);

// Shaft Flat (D-cut)
const flatGeom = new THREE.BoxGeometry(0.3, 0.1, 1);
const flat = new THREE.Mesh(flatGeom, shaftMaterial);
flat.position.set(0, 0.15, 1.5);
motorGroup.add(flat);

// Back Connector/Wires
const connectorGeom = new THREE.BoxGeometry(0.8, 0.4, 0.4);
const connector = new THREE.Mesh(connectorGeom, bodyMaterial);
connector.position.set(0, -0.8, -1);
motorGroup.add(connector);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
directionalLight.position.set(5, 5, 5);
scene.add(directionalLight);

const blueLight = new THREE.PointLight(0x3b82f6, 1, 10);
blueLight.position.set(-2, 2, 2);
scene.add(blueLight);

camera.position.z = 5;
camera.position.y = 1;
camera.lookAt(0, 0, 0);

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    
    // Smooth idle rotation
    motorGroup.rotation.y += 0.005;
    motorGroup.rotation.x = Math.sin(Date.now() * 0.001) * 0.1;
    
    // Simulate shaft spinning
    shaft.rotation.y += 0.05;
    flat.rotation.y += 0.05;

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_9 -->
</body>
</html>
